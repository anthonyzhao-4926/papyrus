<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Papyrus · Logo 选型 v2</title>
<style>
  :root{ --c-bg:#ffffff; --c-bg-elev:#f7f8fa; --c-border:#e6e8eb; --c-text:#1f2328; --c-text-mute:#5b6470; --c-text-faint:#8b95a3; --c-accent:#2563eb; }
  html.dark{ --c-bg:#0b0d10; --c-bg-elev:#15181d; --c-border:#1f2937; --c-text:#e5e7eb; --c-text-mute:#94a3b8; --c-text-faint:#64748b; --c-accent:#60a5fa; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--c-bg);color:var(--c-text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;font-size:14px}
  .top{display:flex;align-items:center;gap:16px;padding:16px 28px;border-bottom:1px solid var(--c-border)}
  .top h1{font-size:16px;margin:0}
  .toggle{margin-left:auto;cursor:pointer;border:1px solid var(--c-border);border-radius:8px;padding:6px 10px;font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:28px;max-width:1180px;margin:0 auto}
  .card{border:1px solid var(--c-border);border-radius:14px;padding:22px;background:var(--c-bg-elev)}
  .card h2{font-size:13px;margin:0 0 4px;color:var(--c-accent);text-transform:uppercase;letter-spacing:.04em}
  .card .d{font-size:12.5px;color:var(--c-text-mute);margin:0 0 20px;min-height:50px;line-height:1.55}
  .sizes{display:flex;align-items:flex-end;gap:24px;margin-bottom:20px}
  .sz{display:flex;flex-direction:column;align-items:center;gap:6px}
  .sz span{font-size:10px;color:var(--c-text-faint)}
  .ic72{width:72px;height:72px}.ic32{width:32px;height:32px}.ic16{width:16px;height:16px}
  .onDark{background:#0b0d10;border-radius:12px;padding:10px;display:flex;gap:18px;align-items:center;margin-bottom:18px}
  .onLight{background:#fff;border:1px solid #e6e8eb;border-radius:12px;padding:10px;display:flex;gap:18px;align-items:center;margin-bottom:18px}
  .tab{display:inline-flex;align-items:center;gap:7px;background:var(--c-bg);border:1px solid var(--c-border);
    border-bottom:none;border-radius:8px 8px 0 0;padding:7px 12px;font-size:12px;color:var(--c-text-mute);max-width:170px}
  .tab svg{width:15px;height:15px;flex:none}
  .tab .x{margin-left:6px;color:var(--c-text-faint)}
  .wordmark{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--c-border)}
  .wordmark svg{width:26px;height:26px}
  .wordmark b{font-size:20px;font-weight:800;letter-spacing:-.3px}
</style>
</head>
<body>
  <div class="top"><h1>Papyrus · Logo 选型 v2（有设计性）</h1><span class="toggle" id="t">🌗 切换主题</span></div>
  <div class="grid" id="grid"></div>

<script>
  // hex 混合工具
  function hex2rgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function rgb2hex(r){return '#'+r.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
  function mix(a,b,t){const A=hex2rgb(a),B=hex2rgb(b);return rgb2hex([0,1,2].map(i=>A[i]+(B[i]-A[i])*t));}

  // ---- 各方案：返回 viewBox 32 的 inner SVG ----
  function weave(ac){
    // 莎草纸编织：竖条(warp)=主色，横条(weft)=浅一档；交错处补色制造过/欠纹理
    const weft = mix(ac,'#ffffff',0.45), warp = ac;
    const V=[7,16,25], H=[7,16,25], w=5.0, len0=4, len1=28, r=2.5;
    let s='';
    // 横条（在下）
    H.forEach(cy=>{ s+=`<rect x="${len0}" y="${cy-w/2}" width="${len1-len0}" height="${w}" rx="${r}" fill="${weft}"/>`; });
    // 竖条（在上，整体压住横条）
    V.forEach(cx=>{ s+=`<rect x="${cx-w/2}" y="${len0}" width="${w}" height="${len1-len0}" rx="${r}" fill="${warp}"/>`; });
    // 在 (col+row) 为奇数的交点，让横条重新压上 → 平纹编织
    for(let c=0;c<3;c++)for(let rw=0;rw<3;rw++){ if((c+rw)%2===1){ s+=`<rect x="${V[c]-w/2-0.4}" y="${H[rw]-w/2}" width="${w+0.8}" height="${w}" rx="1.6" fill="${weft}"/>`; } }
    return s;
  }
  function spiralP(ac,sw){
    // 卷起的纸卷构成 P 的字碗（螺旋收尾），单笔描边
    return `<path d="M12 27.5 V9.5 C12 6.6 14 5 17.2 5 C22.4 5 26 8.4 26 13.2 C26 17.3 22.8 20 18.6 20 C15.2 20 12.8 17.7 12.8 14.6 C12.8 12.2 14.5 10.6 16.7 10.6 C18.5 10.6 19.7 11.8 19.8 13.5"
      fill="none" stroke="${ac}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
  function spiralPSolid(ac){
    const sq = ac;
    return `<rect width="32" height="32" rx="7.5" fill="${sq}"/>`+
      `<path d="M12 27 V10 C12 7.4 13.9 6 16.8 6 C21.4 6 24.6 9 24.6 13.2 C24.6 16.8 21.8 19.2 18 19.2 C15 19.2 12.9 17.2 12.9 14.5 C12.9 12.4 14.4 11 16.4 11 C18 11 19.1 12.05 19.2 13.5"
        fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
  function foldedDoc(ac){
    // 折角纸张 + 负空间 P，双色制造层次
    const dark = mix(ac,'#000000',0.28), fold = mix(ac,'#000000',0.12);
    return `<path d="M7 4 H20 L26 10 V27 A1.5 1.5 0 0 1 24.5 28.5 H8.5 A1.5 1.5 0 0 1 7 27 Z" fill="${ac}"/>`+
      `<path d="M20 4 L26 10 H21.5 A1.5 1.5 0 0 1 20 8.5 Z" fill="${dark}"/>`+
      // 负空间 P
      `<path d="M12.5 23 V11.5 H17 C19.2 11.5 20.8 13 20.8 15.2 C20.8 17.4 19.2 18.9 17 18.9 H12.5"
        fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
  function sealP(ac){
    // 印章/钤印风：圆环 + 衬线 P + 一点螺旋尾，编辑感
    const ring = ac;
    return `<circle cx="16" cy="16" r="13" fill="none" stroke="${ring}" stroke-width="1.6"/>`+
      `<circle cx="16" cy="16" r="13" fill="none" stroke="${ring}" stroke-width="0.6" stroke-dasharray="0.2 2.4" stroke-linecap="round" opacity="0.9"/>`+
      `<path d="M13 23 V9.5 H18 C20.6 9.5 22.4 11.2 22.4 13.8 C22.4 16.4 20.6 18.1 18 18.1 H13"
        fill="none" stroke="${ring}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`+
      `<path d="M13 23 C11.2 23 10.2 21.9 10.5 20.4" fill="none" stroke="${ring}" stroke-width="2.2" stroke-linecap="round"/>`;
  }

  const icons = [
    {name:'方案 A · 莎草纸编织', desc:'还原莎草纸的本质——芦苇条交错平纹编织。双色经纬 + 过/欠压纹理，是个抽象织片标记，独一无二、和名字强绑定。', build:(ac)=>weave(ac)},
    {name:'方案 B · 纸卷螺旋 P（描边）', desc:'一笔从竖画卷起，收尾成螺旋纸卷，同时构成字母 P 的字碗。把「卷轴」和「P」合二为一，造型感强。', build:(ac)=>spiralP(ac,3.2)},
    {name:'方案 C · 纸卷螺旋 P（蓝底负空间）', desc:'方案 B 的实底版：主题蓝圆角块 + 白色螺旋 P。小尺寸最稳，标签栏里最跳。', build:(ac)=>spiralPSolid(ac)},
    {name:'方案 D · 折角纸张 P', desc:'一页折角文稿 + 负空间 P，双色阴影做出纸张层次。现代、克制、有「文档/笔记」语义。', build:(ac)=>foldedDoc(ac)},
    {name:'方案 E · 钤印 P', desc:'圆形印章 + 衬线 P + 螺旋尾，虚线内圈像盖章齿边。编辑/出版气质，很有调性。', build:(ac)=>sealP(ac)},
  ];

  function render(){
    const ac = getComputedStyle(document.documentElement).getPropertyValue('--c-accent').trim();
    const grid = document.getElementById('grid');
    grid.innerHTML = icons.map(ic=>{
      const inner = ic.build(ac);
      const mk = (cls)=>`<svg class="${cls}" viewBox="0 0 32 32">${inner}</svg>`;
      return `<div class="card">
        <h2>${ic.name}</h2>
        <p class="d">${ic.desc}</p>
        <div class="sizes">
          <div class="sz">${mk('ic72')}<span>72px</span></div>
          <div class="sz">${mk('ic32')}<span>32px</span></div>
          <div class="sz">${mk('ic16')}<span>16px(真实)</span></div>
        </div>
        <div class="onLight">${mk('ic32')}<div class="tab">${mk('')}<span>Papyrus</span><span class="x">×</span></div></div>
        <div class="onDark">${mk('ic32')}<span style="color:#e5e7eb;font-size:12px">暗色背景检验</span></div>
        <div class="wordmark">${mk('')}<b>Papyrus<span style="color:${ac}">.</span></b></div>
      </div>`;
    }).join('');
  }
  render();
  document.getElementById('t').onclick=()=>{document.documentElement.classList.toggle('dark');render();};
</script>
</body>
</html>
