<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Papyrus · Tag 页面设计</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --c-bg: #ffffff;
    --c-bg-elev: #f7f8fa;
    --c-border: #e6e8eb;
    --c-text: #1f2328;
    --c-text-mute: #5b6470;
    --c-text-faint: #8b95a3;
    --c-accent: #2563eb;
  }
  body { background: var(--c-bg); color: var(--c-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }
  .border-border { border-color: var(--c-border); }
  .text-text { color: var(--c-text); }
  .text-text-mute { color: var(--c-text-mute); }
  .text-text-faint { color: var(--c-text-faint); }
  .text-accent { color: var(--c-accent); }
  .bg-bg { background: var(--c-bg); }
  .bg-bg-elev { background: var(--c-bg-elev); }
  .switcher { position: fixed; top: 16px; left: 16px; z-index: 50; background: white; border: 1px solid var(--c-border); border-radius: 12px; padding: 8px; display: flex; gap: 6px; box-shadow: 0 10px 30px -10px rgba(0,0,0,.15); }
  .switcher button { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; }
  .switcher button.active { background: #1f2328; color: white; }
  .option { display: none; }
  .option.active { display: block; }
</style>
</head>
<body>

<div class="switcher">
  <button data-opt="A" class="active">A · 卡片 + 文章</button>
  <button data-opt="B">B · 双栏杂志</button>
  <button data-opt="C">C · 文章为主</button>
</div>

<!-- 共用 header -->
<template id="tpl-header">
  <header class="flex items-center px-8 py-4 border-b border-border gap-6">
    <a href="#" class="font-bold text-base tracking-tight">Papyrus<span class="text-accent">.</span></a>
    <nav class="flex gap-1 text-sm">
      <a href="#" class="px-3 py-1.5 rounded-md text-text-mute hover:text-text hover:bg-bg-elev">首页</a>
      <a href="#" class="px-3 py-1.5 rounded-md text-text font-medium bg-bg-elev">📘 学习</a>
      <a href="#" class="px-3 py-1.5 rounded-md text-text-mute hover:text-text hover:bg-bg-elev">💼 工作</a>
      <a href="#" class="px-3 py-1.5 rounded-md text-text-mute hover:text-text hover:bg-bg-elev">🌱 生活</a>
    </nav>
    <div class="ml-auto flex items-center gap-3">
      <button class="flex items-center gap-2 bg-bg-elev px-3 py-1.5 rounded-md text-xs text-text-faint w-64">
        <span>🔍</span><span>搜索文章...</span>
        <span class="ml-auto flex gap-1">
          <span class="bg-bg border border-border rounded px-1.5 text-[11px]">⌘</span>
          <span class="bg-bg border border-border rounded px-1.5 text-[11px]">K</span>
        </span>
      </button>
      <button class="w-8 h-8 border border-border rounded-md text-sm">🌙</button>
    </div>
  </header>
</template>

<script>
  // 假数据：3 个 repo + 一批文章
  const repos = [
    { slug: "ai-skills", title: "个人 AI Skills", desc: "这里存放了我的个人 skill", icon: "📘", count: 12, latest: "2 天前", grad: "from-blue-500 to-indigo-600" },
    { slug: "reading", title: "读书笔记", desc: "读完一本书后整理的思考", icon: "📚", count: 7, latest: "1 周前", grad: "from-emerald-500 to-teal-600" },
    { slug: "courses", title: "课程笔记", desc: "网课与培训的整理", icon: "🎓", count: 3, latest: "2 周前", grad: "from-amber-500 to-orange-600" },
  ];
  const articles = [
    { date: "06-04", title: "用 unified 写一个自动编号的 rehype 插件", repo: "个人 AI Skills", repoIcon: "📘", min: 4,
      excerpt: "从零搭建 unified 处理管道，自定义 rehype 插件，给 markdown 标题自动加 1./1.1. 编号，不破坏 anchor 链接和 TOC 提取⋯⋯" },
    { date: "05-30", title: "读《思考，快与慢》第 7 章", repo: "读书笔记", repoIcon: "📚", min: 6,
      excerpt: "系统 1 的直觉判断为什么经常出错？卡尼曼用 WYSIATI 解释——我们只用眼前的信息做决策，对缺失的信息毫无察觉⋯⋯" },
    { date: "05-28", title: "Astro 5 的 content layer 笔记", repo: "个人 AI Skills", repoIcon: "📘", min: 5,
      excerpt: "Content Layer 是 Astro 5 的新数据层抽象，它把所有内容源（文件、CMS、API）统一成可查询的 collections⋯⋯" },
    { date: "05-19", title: "Anki 牌组重构思路", repo: "课程笔记", repoIcon: "🎓", min: 4,
      excerpt: "原本一本课就一个 deck，太大了。试着按章节拆 sub-deck，并把 cloze 题型替换成 basic + reversed⋯⋯" },
    { date: "05-12", title: "Claude Code skill 系统拆解", repo: "个人 AI Skills", repoIcon: "📘", min: 7,
      excerpt: "Claude Code 的 skill 是组织 AI 行为的元能力。这篇拆解 skill 的加载机制、命名规范、以及怎么写一个新 skill⋯⋯" },
    { date: "05-08", title: "MIT 6.824 Lab 1 备忘", repo: "课程笔记", repoIcon: "🎓", min: 5,
      excerpt: "实现 MapReduce coordinator 时遇到的几个坑：task 超时如何重新分配、worker crash 后的恢复策略⋯⋯" },
    { date: "04-30", title: "读《Designing Data-Intensive Applications》第 5 章", repo: "读书笔记", repoIcon: "📚", min: 8,
      excerpt: "复制策略的核心权衡：同步 vs 异步、单主 vs 多主。这一章给的例子很清晰，特别是 leaderless replication 的 quorum 推导⋯⋯" },
    { date: "04-22", title: "重新组织个人 wiki 的层级", repo: "读书笔记", repoIcon: "📚", min: 3,
      excerpt: "原本按主题分一级，太散了。改成 GTD 风格：领域 → 项目 → 笔记，操作起来更顺⋯⋯" },
  ];

  function repoCard(r) {
    return `
      <a href="#" class="group relative flex flex-col overflow-hidden border border-border rounded-2xl bg-white transition-all duration-200 hover:-translate-y-[2px] hover:shadow-[0_24px_48px_-20px_rgba(15,23,42,.28)]">
        <div class="h-[78px] bg-gradient-to-br ${r.grad} relative overflow-hidden">
          <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full bg-white/10"></div>
          <div class="absolute right-8 top-10 w-12 h-12 rounded-full bg-white/10"></div>
          <div class="absolute left-5 bottom-3 w-12 h-12 rounded-[14px] bg-white/95 flex items-center justify-center text-2xl shadow-lg">${r.icon}</div>
        </div>
        <div class="p-[22px] pt-[18px] flex-1 flex flex-col">
          <h4 class="text-[17px] font-bold tracking-[-0.01em] mb-[6px]">${r.title}</h4>
          <p class="text-[13px] text-text-mute leading-[1.6] mb-[16px] flex-1">${r.desc}</p>
          <div class="flex items-center justify-between text-[12px] text-text-faint">
            <span class="font-medium text-text-mute">${r.count} 篇</span>
            <span>${r.latest}</span>
          </div>
        </div>
      </a>`;
  }
  function repoMini(r) {
    return `
      <a href="#" class="flex items-center justify-between p-3 border border-border rounded-lg hover:bg-bg-elev transition">
        <span class="flex items-center gap-3 min-w-0">
          <span class="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0 bg-gradient-to-br ${r.grad} text-white">${r.icon}</span>
          <span class="min-w-0">
            <div class="text-[14px] font-semibold truncate">${r.title}</div>
            <div class="text-[11px] text-text-faint">${r.count} 篇 · ${r.latest}</div>
          </span>
        </span>
        <span class="text-text-faint">→</span>
      </a>`;
  }
  function articleRow(a) {
    return `
      <div class="grid grid-cols-[58px_1fr_auto] gap-4 items-baseline py-[12px] text-[14px] border-t border-border first:border-t-0">
        <span class="text-[12px] text-text-faint tabular-nums">${a.date}</span>
        <a href="#" class="text-text hover:text-accent truncate" title="${a.title}">${a.title}</a>
        <span class="text-[11px] text-text-mute border border-border rounded-full px-2 py-[2px] whitespace-nowrap">${a.repo}</span>
      </div>`;
  }
  function articleCard(a) {
    return `
      <a href="#" class="group block py-7 border-t border-border first:border-t-0 first:pt-0">
        <div class="flex items-center gap-3 mb-2 text-[12px] text-text-faint">
          <span class="tabular-nums">${a.date}</span>
          <span>·</span>
          <span class="flex items-center gap-1">${a.repoIcon} ${a.repo}</span>
          <span>·</span>
          <span>${a.min} 分钟</span>
        </div>
        <h3 class="text-[18px] font-bold tracking-[-0.01em] leading-[1.4] mb-2 group-hover:text-accent transition">${a.title}</h3>
        <p class="text-[14px] text-text-mute leading-[1.65] line-clamp-2">${a.excerpt}</p>
      </a>`;
  }
</script>

<!-- ============================================== -->
<!-- A · 卡片 + 文章 -->
<!-- ============================================== -->
<div class="option active" data-opt="A">
  <div id="hdrA"></div>
  <main class="max-w-[1100px] mx-auto px-8">
    <!-- Hero -->
    <section class="pt-10 pb-10 border-b border-border">
      <div class="text-[12px] tracking-[0.18em] uppercase text-accent font-semibold mb-[14px]">标签</div>
      <h1 class="font-extrabold tracking-[-0.02em] leading-[1.05] text-[44px] mb-3">
        <span class="mr-2">📘</span>学习
      </h1>
      <p class="text-[15px] text-text-mute">3 个笔记本 · 共 22 篇</p>
    </section>

    <!-- 笔记本网格 -->
    <section class="py-12 border-b border-border">
      <div class="flex items-baseline justify-between mb-[22px]">
        <h2 class="text-[22px] font-bold tracking-[-0.01em]">笔记本</h2>
      </div>
      <div id="reposA" class="grid grid-cols-3 gap-5"></div>
    </section>

    <!-- 最近文章列表 -->
    <section class="py-12">
      <div class="flex items-baseline justify-between mb-[22px]">
        <h2 class="text-[22px] font-bold tracking-[-0.01em]">最近文章</h2>
        <span class="text-[12px] text-text-faint">共 22 篇</span>
      </div>
      <div id="actA"></div>
    </section>
  </main>
</div>

<!-- ============================================== -->
<!-- B · 双栏杂志 -->
<!-- ============================================== -->
<div class="option" data-opt="B">
  <div id="hdrB"></div>
  <main class="max-w-[1100px] mx-auto px-8">
    <!-- Hero -->
    <section class="pt-10 pb-10 border-b border-border">
      <div class="text-[12px] tracking-[0.18em] uppercase text-accent font-semibold mb-[14px]">标签</div>
      <h1 class="font-extrabold tracking-[-0.02em] leading-[1.05] text-[44px] mb-3">
        <span class="mr-2">📘</span>学习
      </h1>
      <p class="text-[15px] text-text-mute">3 个笔记本 · 共 22 篇</p>
    </section>

    <!-- 双栏 -->
    <section class="py-12">
      <div class="grid grid-cols-[1.4fr_1fr] gap-14 items-start">
        <!-- 左：文章流 -->
        <div class="min-w-0">
          <h2 class="text-[22px] font-bold tracking-[-0.01em] mb-[18px]">这个标签下的文章</h2>
          <div id="streamB"></div>
        </div>
        <!-- 右：repo 列表 + 统计 -->
        <aside class="grid gap-7">
          <div>
            <div class="text-[13px] font-semibold text-text-mute mb-[12px]">笔记本</div>
            <div id="reposB" class="grid gap-2"></div>
          </div>
          <div class="border border-border rounded-xl p-4">
            <div class="text-[12px] uppercase tracking-[0.14em] text-text-faint font-semibold mb-3">统计</div>
            <div class="grid gap-2">
              <div class="flex justify-between text-[13px]"><span class="text-text-faint">文章总数</span><span class="font-semibold">22 篇</span></div>
              <div class="flex justify-between text-[13px]"><span class="text-text-faint">笔记本</span><span class="font-semibold">3 个</span></div>
              <div class="flex justify-between text-[13px]"><span class="text-text-faint">最近更新</span><span class="font-semibold">2 天前</span></div>
              <div class="flex justify-between text-[13px]"><span class="text-text-faint">本月新增</span><span class="font-semibold">4 篇</span></div>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>
</div>

<!-- ============================================== -->
<!-- C · 文章为主 -->
<!-- ============================================== -->
<div class="option" data-opt="C">
  <div id="hdrC"></div>
  <main class="max-w-[1100px] mx-auto px-8">
    <!-- Hero -->
    <section class="pt-10 pb-8 border-b border-border">
      <div class="text-[12px] tracking-[0.18em] uppercase text-accent font-semibold mb-[14px]">标签</div>
      <h1 class="font-extrabold tracking-[-0.02em] leading-[1.05] text-[44px] mb-3">
        <span class="mr-2">📘</span>学习
      </h1>
      <p class="text-[15px] text-text-mute">3 个笔记本 · 共 22 篇</p>

      <!-- 子 repo 切换 chips -->
      <div class="mt-6 flex flex-wrap gap-2">
        <a class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-text text-bg text-[13px] font-medium">全部 <span class="opacity-70">22</span></a>
        <a class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-border text-[13px] hover:bg-bg-elev transition">📘 个人 AI Skills <span class="text-text-faint">12</span></a>
        <a class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-border text-[13px] hover:bg-bg-elev transition">📚 读书笔记 <span class="text-text-faint">7</span></a>
        <a class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-border text-[13px] hover:bg-bg-elev transition">🎓 课程笔记 <span class="text-text-faint">3</span></a>
      </div>
    </section>

    <!-- 文章卡片流 -->
    <section class="py-2">
      <div class="max-w-[720px]" id="streamC"></div>
    </section>
  </main>
</div>

<script>
  function inject(idHdr) { document.getElementById(idHdr).innerHTML = document.getElementById("tpl-header").innerHTML; }
  inject("hdrA"); inject("hdrB"); inject("hdrC");

  // A
  document.getElementById("reposA").innerHTML = repos.map(repoCard).join("");
  document.getElementById("actA").innerHTML = articles.slice(0, 8).map(articleRow).join("");

  // B
  document.getElementById("streamB").innerHTML = articles.slice(0, 6).map(articleCard).join("");
  document.getElementById("reposB").innerHTML = repos.map(repoMini).join("");

  // C
  document.getElementById("streamC").innerHTML = articles.map(articleCard).join("");

  document.querySelectorAll(".switcher button").forEach((btn) => {
    btn.addEventListener("click", () => {
      const opt = btn.dataset.opt;
      document.querySelectorAll(".switcher button").forEach(b => b.classList.toggle("active", b.dataset.opt === opt));
      document.querySelectorAll(".option").forEach(o => o.classList.toggle("active", o.dataset.opt === opt));
    });
  });
</script>

</body>
</html>
